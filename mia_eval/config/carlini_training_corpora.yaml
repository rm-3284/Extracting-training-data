# Public **training-data** releases used to build shingle indexes for Carlini extract labeling.
# Rows are streamed from Hugging Face Datasets (internet) with ``datasets.load_dataset``.
#
# ``label=1`` means a long normalized substring of the *generated* text is covered by shingles
# seen in these streams — an approximation of “appears in (a sampled slice of) the released
# training corpus”, not a cryptographic guarantee of weight-space membership.
#
# Verify Hub configs before large jobs (repos move). Override paths with CLI or edit YAML.

schema_version: 1

defaults:
  max_shingles: 20000000
  shingle_chars: 200
  min_match_chars: 150

run_training_corpora:
  # --- OLMo 2 ---
  # Avoid streaming ``allenai/olmo-mix-1124`` here: Hub rate-limits (429) many parallel shard
  # GETs, and some ``dclm`` parquet shards still produce Arrow ``Couldn't cast … struct`` when
  # unified. Instead index **Dolmino-mix-1124** (released stage-2 mixture from the OLMo 2 card)
  # plus **mlfoundations/dclm-baseline-1.0** (open DCLM-baseline text aligned with Dolmino’s DCLM slice).
  olmo2_7b_base:
    note: "Dolmino-mix-1124 + DCLM-baseline (no olmo-mix-1124 Hub shards — avoids 429/schema issues)."
    sources:
      - dataset_name: allenai/dolmino-mix-1124
        dataset_config: default
        verification_mode: no_checks
        text_field: text
        max_documents: 12000
      - dataset_name: mlfoundations/dclm-baseline-1.0
        dataset_config: null
        verification_mode: no_checks
        text_field: text
        max_documents: 8000

  olmo2_7b_instruct:
    note: "Same pretrain proxies as base + Tülu 3 SFT OLMo-2 mixture (chat rows flattened)."
    sources:
      - dataset_name: allenai/dolmino-mix-1124
        dataset_config: default
        verification_mode: no_checks
        text_field: text
        max_documents: 8000
      - dataset_name: mlfoundations/dclm-baseline-1.0
        dataset_config: null
        verification_mode: no_checks
        text_field: text
        max_documents: 5000
      - dataset_name: allenai/tulu-3-sft-olmo-2-mixture
        dataset_config: default
        verification_mode: no_checks
        flatten_messages: true
        text_field: text
        max_documents: 7000

  # --- OLMo 1 (Dolma v1.5 sample — documented for OLMo-7B pretraining) ---
  olmo1_7b_base:
    note: "allenai/dolma config v1_5-sample (OLMo-7B family)."
    sources:
      - dataset_name: allenai/dolma
        dataset_config: v1_5-sample
        text_field: text
        max_documents: 20000

  olmo1_7b_instruct:
    note: "Same Dolma slice as base + optional instruct data (overlap mostly Dolma for indexing)."
    sources:
      - dataset_name: allenai/dolma
        dataset_config: v1_5-sample
        text_field: text
        max_documents: 20000

  # --- LLM360 Amber (released tokenized chunks — decode with Amber tokenizer) ---
  llm360_amber_base:
    note: "LLM360/AmberDatasets JSONL shards decoded with LLM360/Amber tokenizer."
    sources:
      - dataset_name: LLM360/AmberDatasets
        data_files: train/train_000.jsonl
        tokenizer_for_decode: LLM360/Amber
        token_field: token_ids
        max_documents: 6000
      - dataset_name: LLM360/AmberDatasets
        data_files: train/train_001.jsonl
        tokenizer_for_decode: LLM360/Amber
        token_field: token_ids
        max_documents: 6000

  llm360_amber_chat:
    note: "Primary memorization signal from Amber pretraining shards (chat adds SFT tokens not fully mirrored here)."
    sources:
      - dataset_name: LLM360/AmberDatasets
        data_files: train/train_000.jsonl
        tokenizer_for_decode: LLM360/Amber
        token_field: token_ids
        max_documents: 6000
      - dataset_name: LLM360/AmberDatasets
        data_files: train/train_001.jsonl
        tokenizer_for_decode: LLM360/Amber
        token_field: token_ids
        max_documents: 6000

  llm360_amber_safe:
    note: "Same index as Amber base/chat proxy (safety SFT not indexed separately)."
    sources:
      - dataset_name: LLM360/AmberDatasets
        data_files: train/train_000.jsonl
        tokenizer_for_decode: LLM360/Amber
        token_field: token_ids
        max_documents: 6000
      - dataset_name: LLM360/AmberDatasets
        data_files: train/train_001.jsonl
        tokenizer_for_decode: LLM360/Amber
        token_field: token_ids
        max_documents: 6000

  # --- GPT-Neo (EleutherAI The Pile) ---
  gpt_neo_2p7:
    note: "EleutherAI/gpt-neo-2.7B trained on The Pile (same public slice as pythia_12b_base)."
    sources:
      - dataset_name: EleutherAI/the_pile_deduplicated
        dataset_config: null
        text_field: text
        max_documents: 20000

  # --- Pythia / Dolly (EleutherAI The Pile) ---
  pythia_12b_base:
    note: "EleutherAI/pythia trained on The Pile."
    sources:
      - dataset_name: EleutherAI/the_pile_deduplicated
        dataset_config: null
        text_field: text
        max_documents: 20000

  dolly_v2_12b:
    note: "GPT-NeoX + Pile-based Dolly SFT (index uses Pile slice as dominant pretrain overlap)."
    sources:
      - dataset_name: EleutherAI/the_pile_deduplicated
        dataset_config: null
        text_field: text
        max_documents: 20000

  # --- StarCoder 2 (BigCode near-dedup Stack — may require HF auth for some hubs) ---
  starcoder2_15b_base:
    note: "bigcode/the-stack-dedup Python slice (code pretraining family)."
    sources:
      - dataset_name: bigcode/the-stack-dedup
        dataset_config: null
        data_dir: data/python
        text_field: content
        max_documents: 20000

  starcoder2_15b_instruct:
    note: "Same Stack slice as base for memorization proxy."
    sources:
      - dataset_name: bigcode/the-stack-dedup
        dataset_config: null
        data_dir: data/python
        text_field: content
        max_documents: 20000

  # --- RedPajama ---
  redpajama_7b_base:
    note: "togethercomputer/RedPajama-INCITE trained on RedPajama-Data-1T."
    sources:
      - dataset_name: togethercomputer/RedPajama-Data-1T
        dataset_config: default
        text_field: text
        max_documents: 20000

  redpajama_7b_chat:
    note: "Same pretraining corpus slice + RLHF data not indexed separately."
    sources:
      - dataset_name: togethercomputer/RedPajama-Data-1T
        dataset_config: default
        text_field: text
        max_documents: 20000

  # --- DCLM (Apple / OpenLM — DCLM-baseline public release) ---
  dclm_7b_base:
    note: "apple/DCLM-7B trained on mlfoundations/dclm-baseline-1.0."
    sources:
      - dataset_name: mlfoundations/dclm-baseline-1.0
        dataset_config: null
        text_field: text
        max_documents: 20000

  dclm_7b_instruct:
    note: "Instruction checkpoint — baseline text overlap via DCLM-baseline slice."
    sources:
      - dataset_name: mlfoundations/dclm-baseline-1.0
        dataset_config: null
        text_field: text
        max_documents: 20000
