# Carlini-style extraction (generation only) for open base vs post-trained checkpoints.
# Run (500 lines per method → 1000 lines/run with top_k + temperature_decay):
#   python -m mia_eval.run_carlini_extraction_batch --config mia_eval/config/carlini_open_models.yaml
# Cluster: sbatch jobscript/run_carlini_open_extract_array.slurm
# One machine: ./jobscript/run_carlini_open_extract_local.sh
#
# Hugging Face IDs: verify on the Hub before large runs; rename if a repo moved.
# DCLM instruct: user table says DCLM-7B-Instruct; closest public checkpoint is often mlfoundations/dclm-7b-it.

experiment:
  seed: 42
  output_dir: mia_eval_outputs
  device: null

generation:
  # Top-k / internet / temperature / nucleus block. Set ``enabled: false`` to run only
  # ``memorization_detection`` (see ``mia_eval/config/carlini_overlay_memorization_risk_fast_slow.yaml``).
  carlini_sampling:
    enabled: true
  # Match mia_eval/config/defaults.yaml — Carlini §5.1.1 style empty prompt → 256 tokens.
  # Per **enabled** method: `top_k`, `temperature_decay`, and (if nucleus.enabled) `nucleus`
  # each get this many lines. With internet_prefix (Carlini §5.1.2: CC prefix + top-n only) → 500×3 = 1500 rows/model.
  num_samples_per_strategy: 500
  batch_size: 4
  seq_len: 256
  top_k: 40
  top_p: 1.0
  temperature_decay:
    enabled: true
  nucleus:
    enabled: false
    top_p: 0.95
    temperature: 1.0
  # Carlini §5.1.2: sample 5–10 tokens of web context, then **top-n** (here: top_k) — not temperature decay.
  # Paper uses three separate pools: Top-n | Temperature | Internet (Table 2 / Figure 4).
  # To also run internet + temperature_decay (extra), set apply_to: [top_k, temperature_decay].
  internet_prefix:
    enabled: true
    apply_to:
      - top_k
    dataset_name: allenai/c4
    dataset_config: en
    # If C4 streaming fails on the cluster (common), ``generation.py`` falls back to Wikipedia EN.
    # Override with explicit fallbacks, e.g.:
    # fallback_datasets:
    #   - dataset_name: wikipedia
    #     dataset_config: "20220301.en"
    #     text_field: text
    text_field: text
    split: train
    prefix_tokens: 10
    min_doc_chars: 80
    prefix_chars_max: 512
    skip_initial_documents: 0
  add_training_excerpts_members: 0
  add_wikipedia_nonmembers: 0
  # Optional: ``memorization_detection/memorization_detection.py`` decoders (sequential; slow is costly).
  # Each listed strategy appends ``num_samples_per_strategy`` rows with ``source`` =
  # memorization_baseline | memorization_risk_fast | memorization_risk_slow | memorization_wbc.
  # For ``memorization_wbc``, set ``reference_model`` here and/or ``reference_model`` on a ``carlini_runs`` row.
  memorization_detection:
    enabled: false
    # num_samples_per_strategy: 500   # default: same as ``num_samples_per_strategy`` above
    # strategies:
    #   - memorization_baseline
    #   - memorization_risk_fast
    #   - memorization_risk_slow
    #   # - memorization_wbc
    # reference_model: null   # HF id for WBC contrast model (e.g. smaller LM on same tokenizer)
    decode_top_k: 20
    temperature: 1.0
    gate_gamma: 5.0
    risk_every: 1
    lambda_penalty_fast: 0.3
    lambda_penalty_slow: 0.5
    wbc_lambda: 0.5
    wbc_infilling_lambda: 0.3
    wbc_gate_every: 4

# Each entry becomes output_dir/carlini_extract/<run_key>/samples.jsonl
carlini_runs:
  # --- OLMo 2 (Ai2) ---
  - run_key: olmo2_7b_base
    project: OLMo2
    hf_model_id: allenai/OLMo-2-1124-7B
    variant: base
    post_training: null
    torch_dtype: bfloat16

  - run_key: olmo2_7b_instruct
    project: OLMo2
    hf_model_id: allenai/OLMo-2-1124-7B-Instruct
    variant: post_train
    post_training: "SFT + DPO + RLVR"
    torch_dtype: bfloat16

  # --- OLMo 1 (Ai2) ---
  - run_key: olmo1_7b_base
    project: OLMo1
    hf_model_id: allenai/OLMo-7B
    variant: base
    post_training: null
    torch_dtype: bfloat16

  - run_key: olmo1_7b_instruct
    project: OLMo1
    hf_model_id: allenai/OLMo-7B-Instruct
    variant: post_train
    post_training: "SFT + DPO (Tülu 2)"
    torch_dtype: bfloat16

  # --- LLM360 Amber ---
  - run_key: llm360_amber_base
    project: LLM360
    hf_model_id: LLM360/Amber
    variant: base
    post_training: null
    torch_dtype: float16

  - run_key: llm360_amber_chat
    project: LLM360
