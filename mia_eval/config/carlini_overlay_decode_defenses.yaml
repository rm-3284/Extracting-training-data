# Merge on top of ``carlini_open_models.yaml`` for decode-time defenses + Carlini baselines.
# Defenses use ``decode_top_k`` / ``carlini_match_top_k`` aligned with attack ``top_k: 40``.
#
#   sbatch jobscript/run_carlini_decode_defenses_gpt_neo_per_method_array.slurm

experiment:
  carlini_extract_subdir: carlini_extract_decode_defenses

generation:
  carlini_sampling:
    enabled: true
  num_samples_per_strategy: 500
  memorization_detection:
    enabled: true
    carlini_match_top_k: 40
    decode_top_k: 40
    num_samples_per_strategy: 500
    reference_model: null
    risk_every: 8
    fast_infilling_window: 32
    sparse_infilling_top_n: 2
    risk_explore_eps: 0.02
    wbc_lambda: 0.6
    cheap_logits_lambda: 0.5
    cheap_logits_margin_threshold: 1.0
    contrast_gate_gamma: 3.0
    ppl_gate_threshold: 20.0
    ppl_gate_window: 50
    ppl_resample_threshold: 25.0
    max_resamples: 2
    strategies:
      - memorization_topk_control
      - memorization_baseline
      - memorization_cheap_logits
      - memorization_contrastive
      - memorization_ppl_gated_contrastive
      - memorization_resample_contrastive
      - memorization_sparse_infilling
      - memorization_wbc_no_infilling
    lambda_penalty_fast: 0.3
    wbc_infilling_lambda: 0.3
    wbc_gate_every: 4
