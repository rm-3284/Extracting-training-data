# Merge with experiment.yaml or override via CLI --set key=value

experiment:
  seed: 42
  output_dir: mia_eval_outputs
  max_length_tokens: 256
  device: null  # cuda if available else cpu

# Active preset: gpt_neo_2p7 | pythia_2p8 | redpajama_7b
active_model: gpt_neo_2p7

models:
  gpt_neo_2p7:
    target_model: EleutherAI/gpt-neo-2.7B
    reference_model: EleutherAI/gpt-neo-125M
    tokenizer: EleutherAI/gpt-neo-2.7B
    torch_dtype: float16
    ground_truth:
      # Streaming HF dataset used to build membership index (Pile family matches GPT-Neo / Pythia pretraining).
      dataset_name: EleutherAI/the_pile_deduplicated
      dataset_config: null
      text_field: text
      max_documents: 2000
      max_shingles: 2000000
      shingle_chars: 200
      min_match_chars: 150

  pythia_2p8:
    target_model: EleutherAI/pythia-2.8b
    reference_model: EleutherAI/pythia-160m
    tokenizer: EleutherAI/pythia-2.8b
    torch_dtype: float16
    ground_truth:
      dataset_name: EleutherAI/the_pile_deduplicated
      dataset_config: null
      text_field: text
      max_documents: 2000
      max_shingles: 2000000
      shingle_chars: 200
      min_match_chars: 150

  redpajama_7b:
    target_model: togethercomputer/RedPajama-INCITE-7B-Base
    reference_model: togethercomputer/RedPajama-INCITE-Base-3B-v1
    tokenizer: togethercomputer/RedPajama-INCITE-7B-Base
    torch_dtype: float16
    ground_truth:
      # Full corpus (streamed; capped by max_documents / max_shingles). If load_dataset
      # requires a subset name on your datasets version, set e.g. dataset_config: c4
      dataset_name: togethercomputer/RedPajama-Data-1T
      dataset_config: null
      text_field: text
      max_documents: 2000
      max_shingles: 2000000
      shingle_chars: 200
      min_match_chars: 150

generation:
  # Carlini et al. style (see Extracting-Training-Data-from-Large-Langauge-Models): empty EOS prompt, 256 tokens.
  num_samples_per_strategy: 64
  batch_size: 4
  seq_len: 256
  top_k: 40
  top_p: 1.0
  temperature_decay:
    enabled: true
    # First 20 positions: paper mapping (handled in code); then T=1.0
  nucleus:
    enabled: false
    top_p: 0.95
    temperature: 1.0
  # Additional guaranteed non-members (no pile overlap expected): short Wikipedia-style snippets
  add_wikipedia_nonmembers: 32
  wikipedia_dataset: wikipedia
  wikipedia_config: "20220301.en"
  wikipedia_split: train
  # Raw training excerpts labeled member=1 (not generated)
  add_training_excerpts_members: 32

methods:
  # Grids sized for a serious baseline (more compute than a smoke test). Trim lists if runs are too slow.

  infilling:
    # m = lookahead; k = bottom-k fraction (OpenReview infilling MIA).
    hyperparameter_search:
      type: grid
      grid:
        m: [1, 3, 5, 7]
        k: [0.05, 0.1, 0.15, 0.2]

  wbc:
    # Window scales for ~256-token texts; num_windows around the paper’s ~10 ensemble size.
    # Optional multi-schedule ensemble: set use_ensemble + ensemble_variants (see mia_eval/README).
    hyperparameter_search:
      type: grid
      grid:
        min_window: [2]
        max_window: [32, 40, 56, 72]
        num_windows: [8, 10, 12]

  memtrace:
    # Align with experiment.max_length_tokens / generation.seq_len.
    max_length: 256
    hyperparameter_search:
      type: grid
      grid:
        n_estimators: [150, 250, 350]
        max_depth: [5, 10, 15]
        min_samples_leaf: [2, 4]

evaluation:
  test_fraction: 0.2
  # Share of data after the test holdout used for val (stabler AUC for picking grid points).
  val_fraction: 0.2
  random_state: 42
