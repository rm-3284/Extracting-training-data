# Merge over defaults:  python -m mia_eval.score_sequence --config mia_eval/config/defaults.yaml --experiment mia_eval/config/qwen2p5.yaml --preset qwen25_7b_base --text "Hello"
#
# WBC references are same-family smaller checkpoints (0.5B–3B) where available.

experiment:
  max_length_tokens: 512
  device: null

active_model: qwen25_7b_base

models:
  qwen25_7b_base:
    target_model: Qwen/Qwen2.5-7B
    reference_model: Qwen/Qwen2.5-1.5B
    tokenizer: Qwen/Qwen2.5-7B
    torch_dtype: bfloat16

  qwen25_7b_instruct:
    target_model: Qwen/Qwen2.5-7B-Instruct
    reference_model: Qwen/Qwen2.5-1.5B-Instruct
    tokenizer: Qwen/Qwen2.5-7B-Instruct
    torch_dtype: bfloat16

  qwen25_7b_coder:
    target_model: Qwen/Qwen2.5-Coder-7B
    reference_model: Qwen/Qwen2.5-Coder-1.5B
    tokenizer: Qwen/Qwen2.5-Coder-7B
    torch_dtype: bfloat16

  qwen25_7b_math:
    target_model: Qwen/Qwen2.5-Math-7B
    reference_model: Qwen/Qwen2.5-Math-1.5B
    tokenizer: Qwen/Qwen2.5-Math-7B
    torch_dtype: bfloat16

  distil_qwen25_7b_instruct:
    target_model: alibaba-pai/DistilQwen2.5-7B-Instruct
    reference_model: Qwen/Qwen2.5-0.5B-Instruct
    tokenizer: alibaba-pai/DistilQwen2.5-7B-Instruct
    torch_dtype: bfloat16

  # Same target as distil_qwen25_7b_instruct; use for A/B vs 0.5B WBC reference.
  distil_qwen25_7b_instruct_wbc_ref_3b:
    target_model: alibaba-pai/DistilQwen2.5-7B-Instruct
    reference_model: Qwen/Qwen2.5-3B-Instruct
    tokenizer: alibaba-pai/DistilQwen2.5-7B-Instruct
    torch_dtype: bfloat16

  # Distil instruct target; **base** 0.5B reference (non-instruct) for WBC exploratory contrast.
  distil_qwen25_7b_instruct_wbc_ref_0p5b_base:
    target_model: alibaba-pai/DistilQwen2.5-7B-Instruct
    reference_model: Qwen/Qwen2.5-0.5B
    tokenizer: alibaba-pai/DistilQwen2.5-7B-Instruct
    torch_dtype: bfloat16

# Fixed scoring hyperparameters (transfer-friendly defaults from mia_eval grid).
score_sequence:
  infilling:
    m: 5
    k: 0.2
  wbc:
    min_window: 2
    max_window: 40
    num_windows: 8
  memtrace_max_length: 512

# Presets to train memTrace RF on proxy JSONL (see ``train_memtrace_rf.py``).
memtrace_train_presets:
  - qwen25_7b_base
  - qwen25_7b_instruct
  - qwen25_7b_coder
  - qwen25_7b_math
  - distil_qwen25_7b_instruct

# RF hyperparameters (transfer-friendly defaults; same as mia_eval grid winners).
memtrace_rf_train:
  n_estimators: 250
  max_depth: 5
  min_samples_leaf: 2
  random_state: 42
  feature_batch_size: 2

# --- MIA reference-score pipeline (no shingle labels) ---
# Run: ``python -m mia_eval.run_pipeline --config .../defaults.yaml --experiment .../qwen2p5.yaml --steps all_mia_gt``
# Writes ``samples_mia_gt.jsonl`` + ``results_mia_gt.json`` under ``experiment.output_dir/<active_model>/``.
methods:
  memtrace:
    max_length: 256

mia_gt_pipeline:
  # Resolves ``{memtrace_rf_dir}/{active_model}_memtrace_rf.joblib`` unless ``memtrace_rf_joblib`` is set.
  memtrace_rf_dir: data/memtrace_rfs_qwen
  memtrace_max_length: 256
  # Infilling / WBC: primary = transferred from open-model ``mia_eval_outputs/gpt_neo_2p7/results.json``-style winners.
  open_model_infilling:
    m: 1
    k: 0.2
  open_model_infilling_sensitivity:
    m: 5
    k: 0.2
  open_model_wbc:
    min_window: 2
    max_window: 40
    num_windows: 12
  open_model_wbc_sensitivity:
    min_window: 2
    max_window: 56
    num_windows: 10
  # Optional: Morris et al. arXiv:2506.15553-style **diagnostic** (Monte Carlo LM-head alignment).
  # Not the full SELECT / greedy / JL pipeline — see ``mia_eval/docs/morris_2025_select.md``.
  # For Instruct presets set ``base_model`` to the matching Base checkpoint; leave disabled for pure Base.
  select:
    enabled: false
    # base_model: Qwen/Qwen2.5-7B
    n_monte_carlo: 4096
    random_state: 42
    batch_size: 1
    max_length: 256
    # score_device: cpu   # if two 7B models do not fit on one GPU
